<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A-B リピート</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --accent: #ff3d3d;
    --accent2: #ff8c00;
    --pointA: #00d4ff;
    --pointB: #ff3d3d;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    width: 100%;
    max-width: 540px;
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #ff3d3d, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  header span {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .card {
    width: 100%;
    max-width: 540px;
    background: var(--surface);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid #2a2a2a;
  }

  /* URL入力 */
  .url-row {
    display: flex;
    gap: 10px;
  }
  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid #333;
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }
  .load-btn {
    background: linear-gradient(135deg, #ff3d3d, #cc2a2a);
    border: none;
    border-radius: var(--radius);
    padding: 12px 18px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s, transform .1s;
  }
  .load-btn:active { transform: scale(0.97); opacity: .85; }

  /* YouTube埋め込み */
  #player-wrap {
    width: 100%;
    max-width: 540px;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
    border: 1px solid #2a2a2a;
  }
  #player-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* 時間表示バー */
  .time-bar {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
    letter-spacing: .5px;
  }
  .time-bar .current { color: var(--text); font-weight: 700; font-size: 14px; }

  /* プログレスバー（A-B可視化） */
  .progress-wrap {
    position: relative;
    height: 36px;
    margin-bottom: 16px;
    cursor: pointer;
  }
  .progress-track {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 4px;
    background: #333;
    border-radius: 2px;
    transform: translateY(-50%);
  }
  .progress-range {
    position: absolute;
    top: 50%;
    height: 4px;
    background: linear-gradient(90deg, var(--pointA), var(--pointB));
    border-radius: 2px;
    transform: translateY(-50%);
  }
  .progress-played {
    position: absolute;
    top: 50%;
    left: 0;
    height: 4px;
    background: rgba(255,255,255,0.35);
    border-radius: 2px;
    transform: translateY(-50%);
    pointer-events: none;
  }
  .progress-thumb {
    position: absolute;
    top: 50%;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px rgba(0,0,0,.6);
    pointer-events: none;
  }

  /* A・B マーカー */
  .ab-marker {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: grab;
    user-select: none;
  }
  .ab-marker-line {
    width: 2px;
    height: 20px;
    border-radius: 1px;
  }
  .ab-marker-label {
    font-size: 10px;
    font-weight: 700;
    margin-top: 2px;
    letter-spacing: .5px;
  }
  .marker-a .ab-marker-line { background: var(--pointA); }
  .marker-a .ab-marker-label { color: var(--pointA); }
  .marker-b .ab-marker-line { background: var(--pointB); }
  .marker-b .ab-marker-label { color: var(--pointB); }

  /* コントロール */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .ctrl-btn {
    background: var(--surface2);
    border: 1.5px solid #333;
    border-radius: 50%;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 18px;
    transition: border-color .15s, background .15s, transform .1s;
  }
  .ctrl-btn:active { transform: scale(0.93); }
  .ctrl-btn:hover { border-color: #555; background: #2e2e2e; }
  .ctrl-btn.play-btn {
    width: 64px; height: 64px;
    font-size: 26px;
    background: linear-gradient(135deg, #ff3d3d, #cc2a2a);
    border-color: transparent;
  }
  .ctrl-btn.play-btn:hover { background: linear-gradient(135deg, #ff5555, #dd3333); }
  .ctrl-btn.loop-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,140,0,.12);
  }

  /* A/B スライダーセクション */
  .ab-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .ab-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .ab-box {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 14px;
    border: 1.5px solid #2e2e2e;
  }
  .ab-box.a-box { border-color: rgba(0,212,255,.3); }
  .ab-box.b-box { border-color: rgba(255,61,61,.3); }
  .ab-box-label {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .a-box .ab-box-label { color: var(--pointA); }
  .b-box .ab-box-label { color: var(--pointB); }
  .ab-box-time {
    font-size: 20px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
  }
  .a-box .ab-box-time { color: var(--pointA); }
  .b-box .ab-box-time { color: var(--pointB); }
  .ab-set-btn {
    width: 100%;
    margin-top: 8px;
    padding: 7px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    letter-spacing: .5px;
  }
  .ab-set-btn:active { transform: scale(.97); opacity: .8; }
  .a-box .ab-set-btn { background: rgba(0,212,255,.15); color: var(--pointA); }
  .b-box .ab-set-btn { background: rgba(255,61,61,.15); color: var(--pointB); }

  .ab-duration {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .ab-duration span { color: var(--text); font-weight: 700; }

  /* ヒント */
  .hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
    margin-top: 4px;
  }
  .hint b { color: #555; }

  .status-msg {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    min-height: 18px;
  }
  .status-msg.err { color: #ff6b6b; }
</style>
</head>
<body>

<header>
  <h1>A-B REPEAT</h1>
  <span>YouTube区間リピーター</span>
</header>

<!-- URL入力 -->
<div class="card">
  <div class="url-row">
    <input class="url-input" id="urlInput" type="url" placeholder="YouTubeのURLを貼り付け..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="load-btn" onclick="loadVideo()">読込</button>
  </div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<!-- プレイヤー -->
<div id="player-wrap">
  <div id="yt-player"></div>
</div>

<!-- プログレス＋コントロール -->
<div class="card" id="controlCard" style="display:none">
  <div class="time-bar">
    <span class="current" id="timeDisplay">0:00</span>
    <span id="durationDisplay">0:00</span>
  </div>

  <!-- プログレスバー -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"></div>
    <div class="progress-range" id="progressRange"></div>
    <div class="progress-played" id="progressPlayed"></div>
    <div class="progress-thumb" id="progressThumb"></div>
    <!-- A/Bマーカー -->
    <div class="ab-marker marker-a" id="markerA">
      <div class="ab-marker-line"></div>
      <div class="ab-marker-label">A</div>
    </div>
    <div class="ab-marker marker-b" id="markerB">
      <div class="ab-marker-line"></div>
      <div class="ab-marker-label">B</div>
    </div>
  </div>

  <!-- ボタン -->
  <div class="controls">
    <button class="ctrl-btn" title="A点へ戻る" onclick="jumpToA()">⏮</button>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn loop-btn" id="loopBtn" title="A-Bループ" onclick="toggleLoop()">🔁</button>
  </div>

  <!-- A/B設定 -->
  <div class="ab-section-title">ループ区間</div>
  <div class="ab-row">
    <div class="ab-box a-box">
      <div class="ab-box-label">A 開始点</div>
      <div class="ab-box-time" id="aTime">0:00</div>
      <button class="ab-set-btn" onclick="setPointA()">▶ 今ここをA点に</button>
    </div>
    <div class="ab-box b-box">
      <div class="ab-box-label">B 終了点</div>
      <div class="ab-box-time" id="bTime">0:00</div>
      <button class="ab-set-btn" onclick="setPointB()">▶ 今ここをB点に</button>
    </div>
  </div>
  <div class="ab-duration">区間の長さ：<span id="abLength">—</span></div>
</div>

<!-- ヒント -->
<div class="card" id="hintCard" style="display:none">
  <div class="hint">
    <b>使い方</b><br>
    再生しながら <b>「今ここをA点に」</b> → <b>「今ここをB点に」</b> を押す<br>
    🔁 ボタンでA-B区間を無限リピート<br>
    プログレスバーのA・Bマーカーはドラッグで微調整できます
  </div>
</div>

<script>
// ── 状態管理 ──
let player = null;
let duration = 0;
let pointA = 0;
let pointB = 0;
let isLooping = false;
let rafId = null;
let dragging = null; // 'seek'|'a'|'b'

// ── YouTube IFrame API 読み込み ──
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

function onYouTubeIframeAPIReady() {
  // API準備完了（動画読込時に使う）
}

// ── URL解析 ──
function extractVideoId(url) {
  const patterns = [
    /[?&]v=([^&]+)/,
    /youtu\.be\/([^?&]+)/,
    /youtube\.com\/embed\/([^?&]+)/,
    /youtube\.com\/shorts\/([^?&]+)/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

// ── 動画読み込み ──
function loadVideo() {
  const url = document.getElementById('urlInput').value.trim();
  const videoId = extractVideoId(url);
  const msg = document.getElementById('statusMsg');

  if (!videoId) {
    msg.textContent = '⚠ YouTubeのURLを正しく入力してください';
    msg.className = 'status-msg err';
    return;
  }
  msg.textContent = '読み込み中...';
  msg.className = 'status-msg';

  document.getElementById('player-wrap').style.display = 'block';

  if (player) {
    player.loadVideoById(videoId);
    return;
  }

  player = new YT.Player('yt-player', {
    videoId: videoId,
    playerVars: {
      autoplay: 1,
      rel: 0,
      modestbranding: 1,
      playsinline: 1,
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onStateChange,
    }
  });
}

function onPlayerReady(e) {
  duration = player.getDuration();
  pointA = 0;
  pointB = duration;
  document.getElementById('controlCard').style.display = 'block';
  document.getElementById('hintCard').style.display = 'block';
  document.getElementById('durationDisplay').textContent = fmt(duration);
  updateABDisplay();
  startRAF();
  document.getElementById('statusMsg').textContent = '';
}

function onStateChange(e) {
  const state = e.data;
  // 0 = ended
  if (state === 0 && isLooping) {
    player.seekTo(pointA);
    player.playVideo();
  }
  // 更新
  const playing = state === YT.PlayerState.PLAYING;
  document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
  if (playing) startRAF(); else stopRAF();
}

// ── RAF でプログレス更新 ──
function startRAF() {
  if (rafId) return;
  function tick() {
    updateProgress();
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}
function stopRAF() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

function updateProgress() {
  if (!player || !player.getCurrentTime) return;
  duration = player.getDuration() || duration;
  const t = player.getCurrentTime();

  // ループ判定
  if (isLooping && t >= pointB) {
    player.seekTo(pointA, true);
    return;
  }

  document.getElementById('timeDisplay').textContent = fmt(t);

  const pct = duration > 0 ? t / duration : 0;
  const aPct = duration > 0 ? pointA / duration : 0;
  const bPct = duration > 0 ? pointB / duration : 0;

  document.getElementById('progressPlayed').style.width = (pct * 100) + '%';
  document.getElementById('progressThumb').style.left = (pct * 100) + '%';
  document.getElementById('progressRange').style.left = (aPct * 100) + '%';
  document.getElementById('progressRange').style.width = ((bPct - aPct) * 100) + '%';
  document.getElementById('markerA').style.left = (aPct * 100) + '%';
  document.getElementById('markerB').style.left = (bPct * 100) + '%';
}

// ── コントロール ──
function togglePlay() {
  if (!player) return;
  const state = player.getPlayerState();
  if (state === YT.PlayerState.PLAYING) player.pauseVideo();
  else player.playVideo();
}

function jumpToA() {
  if (!player) return;
  player.seekTo(pointA, true);
}

function toggleLoop() {
  isLooping = !isLooping;
  const btn = document.getElementById('loopBtn');
  btn.classList.toggle('active', isLooping);
  btn.title = isLooping ? 'ループON — クリックでOFF' : 'A-Bループ';
}

function setPointA() {
  if (!player) return;
  pointA = player.getCurrentTime();
  if (pointA >= pointB) pointB = Math.min(pointA + 5, duration);
  updateABDisplay();
}

function setPointB() {
  if (!player) return;
  pointB = player.getCurrentTime();
  if (pointB <= pointA) pointA = Math.max(pointB - 5, 0);
  updateABDisplay();
}

function updateABDisplay() {
  document.getElementById('aTime').textContent = fmt(pointA);
  document.getElementById('bTime').textContent = fmt(pointB);
  const len = pointB - pointA;
  document.getElementById('abLength').textContent = len > 0 ? fmt(len) : '—';
  document.getElementById('durationDisplay').textContent = fmt(duration);
}

// ── プログレスバードラッグ ──
const progressWrap = document.getElementById('progressWrap');

function getPctFromEvent(e) {
  const rect = progressWrap.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return Math.max(0, Math.min(1, x / rect.width));
}

function pointerDown(e) {
  if (!player || !duration) return;
  const pct = getPctFromEvent(e);
  const aPct = pointA / duration;
  const bPct = pointB / duration;

  // マーカーに近い方をドラッグ対象にする
  const dSeek = Math.abs(pct - player.getCurrentTime() / duration);
  const dA = Math.abs(pct - aPct);
  const dB = Math.abs(pct - bPct);
  const minD = Math.min(dSeek, dA, dB);

  if (minD === dA && dA < 0.05) dragging = 'a';
  else if (minD === dB && dB < 0.05) dragging = 'b';
  else dragging = 'seek';

  e.preventDefault();
}

function pointerMove(e) {
  if (!dragging || !duration) return;
  const pct = getPctFromEvent(e);
  const t = pct * duration;

  if (dragging === 'seek') {
    player.seekTo(t, true);
  } else if (dragging === 'a') {
    pointA = Math.min(t, pointB - 0.5);
    updateABDisplay();
  } else if (dragging === 'b') {
    pointB = Math.max(t, pointA + 0.5);
    updateABDisplay();
  }
  e.preventDefault();
}

function pointerUp() { dragging = null; }

progressWrap.addEventListener('mousedown', pointerDown);
progressWrap.addEventListener('touchstart', pointerDown, { passive: false });
document.addEventListener('mousemove', pointerMove);
document.addEventListener('touchmove', pointerMove, { passive: false });
document.addEventListener('mouseup', pointerUp);
document.addEventListener('touchend', pointerUp);

// ── 時間フォーマット ──
function fmt(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  s = Math.floor(s);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// Enterキーでも読み込めるように
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadVideo();
});
</script>
</body>
</html>
